services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openarg_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             uvicorn app.run:make_app --factory --host 0.0.0.0 --port 8080 --loop uvloop"
    ports:
      - "8081:8080"
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_CACHE_URL=redis://redis:6379/2
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BACKEND_API_KEY=${BACKEND_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-openarg-datasets}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- WORKERS (Multi-Agent System) ---

  worker-scraper:
    build:
      context: .
      dockerfile: docker/worker-scraper.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-collector:
    build:
      context: .
      dockerfile: docker/worker-collector.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-openarg-datasets}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-ingest:
    build:
      context: .
      dockerfile: docker/worker-ingest.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-openarg-datasets}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-embedding:
    build:
      context: .
      dockerfile: docker/worker-embedding.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-analyst:
    build:
      context: .
      dockerfile: docker/worker-analyst.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-transparency:
    build:
      context: .
      dockerfile: docker/worker-transparency.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-s3:
    build:
      context: .
      dockerfile: docker/worker-s3.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-openarg-datasets}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: docker/beat.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:2.0.0
    command: celery --broker=redis://redis:6379/0 flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    ports:
      - "5556:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
