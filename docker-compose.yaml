services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openarg_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             uvicorn app.run:make_app --factory --host 0.0.0.0 --port 8080 --loop uvloop"
    ports:
      - "8081:8080"
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_CACHE_URL=redis://redis:6379/2
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # MCP server URLs (standalone containers)
      - MCP_SERIES_TIEMPO_URL=http://mcp-series-tiempo:8091
      - MCP_CKAN_URL=http://mcp-ckan:8092
      - MCP_ARGENTINA_DATOS_URL=http://mcp-argentina-datos:8093
      - MCP_SESIONES_URL=http://mcp-sesiones:8094
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- WORKERS (Multi-Agent System) ---

  worker-scraper:
    build:
      context: .
      dockerfile: docker/worker-scraper.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-collector:
    build:
      context: .
      dockerfile: docker/worker-collector.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-embedding:
    build:
      context: .
      dockerfile: docker/worker-embedding.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-analyst:
    build:
      context: .
      dockerfile: docker/worker-analyst.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: docker/beat.Dockerfile
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/openarg_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:2.0.0
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5556:5555"
    depends_on:
      redis:
        condition: service_healthy

  # --- MCP Servers (standalone containers) ---

  mcp-series-tiempo:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
      args:
        MCP_SERVER: series_tiempo_mcp
        MCP_PORT: "8091"
    ports:
      - "8091:8091"
    environment:
      - PYTHONPATH=/app/src
      - MCP_PORT=8091
      - SERIES_TIEMPO_BASE_URL=https://apis.datos.gob.ar/series/api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mcp-ckan:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
      args:
        MCP_SERVER: ckan_mcp
        MCP_PORT: "8092"
    ports:
      - "8092:8092"
    environment:
      - PYTHONPATH=/app/src
      - MCP_PORT=8092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mcp-argentina-datos:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
      args:
        MCP_SERVER: argentina_datos_mcp
        MCP_PORT: "8093"
    ports:
      - "8093:8093"
    environment:
      - PYTHONPATH=/app/src
      - MCP_PORT=8093
      - ARGENTINA_DATOS_BASE_URL=https://api.argentinadatos.com/v1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mcp-sesiones:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
      args:
        MCP_SERVER: sesiones_mcp
        MCP_PORT: "8094"
    ports:
      - "8094:8094"
    environment:
      - PYTHONPATH=/app/src
      - MCP_PORT=8094
      - SESIONES_CHUNKS_DIR=/app/src/app/data/chunks
    volumes:
      - ./src/app/data/chunks:/app/src/app/data/chunks:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pg_data:
  redis_data:
