name: Build & Push

env:
  IMAGE_API: ghcr.io/lucholeonel/openarg/api
  IMAGE_WORKER: ghcr.io/lucholeonel/openarg/worker
  IMAGE_VERSION: latest

on:
  push:
    branches: [main]

jobs:
  build_api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and Push API image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./docker/api.Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and Push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./docker/worker.Dockerfile
          push: true
          tags: ${{ env.IMAGE_WORKER }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
