name: Build & Deploy
env:
  IMAGE_TAG_API: ghcr.io/${{ github.repository_owner }}/openarg/api
  IMAGE_TAG_WORKER: ghcr.io/${{ github.repository_owner }}/openarg/worker

  IMAGE_VERSION: latest

on:
  push:
    branches:
      - main
      - master
      - dataset_cache

jobs:
  build_api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Install
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./docker/api.Dockerfile
          push: true
          tags: ${{env.IMAGE_TAG_API}}:${{env.IMAGE_VERSION}}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Install
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./docker/worker.Dockerfile
          push: true
          tags: ${{env.IMAGE_TAG_WORKER}}:${{env.IMAGE_VERSION}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
