name: openarg-prod

services:
  # ── Infrastructure ──────────────────────────────────────────────
  # PostgreSQL is hosted on AWS RDS (external):
  #   Host: ${POSTGRES_HOST}
  #   DB:   ${POSTGRES_DB}
  #   Requires pgvector extension: CREATE EXTENSION IF NOT EXISTS vector;

  redis:
    image: redis:7-alpine
    container_name: openarg_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API ─────────────────────────────────────────────────
  backend:
    image: ghcr.io/lucholeonel/openarg/api:latest
    container_name: openarg_backend
    restart: always
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             uvicorn app.run:make_app --factory --host 0.0.0.0 --port 8080 --loop uvloop --workers 2"
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      BACKEND_API_KEY: ${BACKEND_API_KEY:-}
      SANDBOX_DATABASE_URL: ${SANDBOX_DATABASE_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-openarg-datasets}
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Workers ──────────────────────────────────────────────
  worker-scraper:
    image: ghcr.io/lucholeonel/openarg/worker-scraper:latest
    container_name: openarg_worker_scraper
    restart: always
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1

    depends_on:
      redis:
        condition: service_healthy

  worker-collector:
    image: ghcr.io/lucholeonel/openarg/worker-collector:latest
    container_name: openarg_worker_collector
    restart: always
    command: ["celery", "-A", "app.infrastructure.celery.app:celery_app", "worker", "-Q", "collector", "-c", "8", "--max-memory-per-child=400000", "--loglevel=info"]
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          memory: 1G
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-openarg-datasets}
    depends_on:
      redis:
        condition: service_healthy

  worker-ingest:
    image: ghcr.io/lucholeonel/openarg/worker-ingest:latest
    container_name: openarg_worker_ingest
    restart: always
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-openarg-datasets}
    depends_on:
      redis:
        condition: service_healthy

  worker-embedding:
    image: ghcr.io/lucholeonel/openarg/worker-embedding:latest
    container_name: openarg_worker_embedding
    restart: always
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1

    depends_on:
      redis:
        condition: service_healthy

  worker-analyst:
    image: ghcr.io/lucholeonel/openarg/worker-analyst:latest
    container_name: openarg_worker_analyst
    restart: always
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      GEMINI_API_KEY: ${GEMINI_API_KEY}

    depends_on:
      redis:
        condition: service_healthy

  worker-transparency:
    image: ghcr.io/lucholeonel/openarg/worker-transparency:latest
    container_name: openarg_worker_transparency
    restart: always
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  worker-s3:
    image: ghcr.io/lucholeonel/openarg/worker-s3:latest
    container_name: openarg_worker_s3
    restart: always
    networks:
      - openarg_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-openarg-datasets}
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Beat (periodic tasks) ────────────────────────────────
  beat:
    image: ghcr.io/lucholeonel/openarg/beat:latest
    container_name: openarg_beat
    restart: always
    networks:
      - openarg_network
    volumes:
      - ./config/prod:/app/config/prod:ro
    env_file:
      - .env
    environment:
      APP_ENV: prod
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/lucholeonel/openarg/frontend:latest
    container_name: openarg_frontend
    restart: always
    networks:
      - openarg_network
    env_file:
      - .env
    environment:
      OPENARG_BACKEND_URL: http://backend:8080
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      OPENARG_BACKEND_API_KEY: ${BACKEND_API_KEY:-}
    depends_on:
      - backend

  # ── Caddy (reverse proxy + auto HTTPS) ─────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: openarg_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - openarg_network
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  openarg_network:
    driver: bridge
